# Production: docker compose --profile prod up
# Development: docker compose --profile dev up
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resident-evil-web
    ports:
      - "5173:80"
    restart: always
    profiles:
      - prod

  app-dev:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev:docker"
    environment:
      - NODE_ENV=development
    profiles:
      - dev

volumes:
  app_node_modules:
